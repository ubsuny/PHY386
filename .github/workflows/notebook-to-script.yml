name: Convert Notebooks for Copilot Review

# pull_request_target runs with write access to the base repo,
# which allows us to push generated .py files back to fork branches
# (requires maintainer_can_modify: true on the PR — the default for fork PRs).
on:
  pull_request_target:
    branches: [Homework2026]
    types: [opened, synchronize]
    paths:
      - '2026/HW/**/*.ipynb'

jobs:
  nbconvert:
    runs-on: ubuntu-latest
    name: Export .ipynb → .py for Copilot

    permissions:
      contents: write

    steps:
      # Safe checkout: check out the fork's exact commit SHA for reading notebooks.
      # persist-credentials: false prevents accidental use of this checkout for pushing.
      - name: Checkout fork head (read-only)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install nbconvert
        run: pip install nbconvert

      - name: Find changed notebooks
        id: changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use the GitHub API to get PR file list — reliable for both fork and same-repo PRs
          NOTEBOOKS=$(gh api repos/ubsuny/PHY386/pulls/${{ github.event.pull_request.number }}/files \
            --paginate --jq '.[] | select(.filename | test("2026/HW/.*\\.ipynb$")) | .filename' \
            | tr '\n' ' ' | xargs)
          echo "notebooks=$NOTEBOOKS" >> "$GITHUB_OUTPUT"
          if [ -z "$NOTEBOOKS" ]; then
            echo "No notebook changes found."
          else
            echo "Changed notebooks: $NOTEBOOKS"
          fi

      - name: Convert notebooks to Python scripts
        id: convert
        if: steps.changed.outputs.notebooks != ''
        run: |
          PY_FILES=""
          for nb in ${{ steps.changed.outputs.notebooks }}; do
            # Skip empty or missing notebooks
            if [ ! -s "$nb" ]; then
              echo "Skipping $nb (empty or missing)"
              continue
            fi
            echo "Converting $nb"
            jupyter nbconvert --to script "$nb" || { echo "Warning: failed to convert $nb"; continue; }
            py="${nb%.ipynb}.py"
            if [ -f "$py" ]; then
              PY_FILES="$PY_FILES $py"
            fi
          done
          echo "py_files=$(echo $PY_FILES | xargs)" >> "$GITHUB_OUTPUT"

      # Push .py files directly to the fork branch via the GitHub Contents API.
      # This works because pull_request_target gives us a write-capable GITHUB_TOKEN
      # and the student's fork has maintainer_can_modify: true (default for fork PRs).
      - name: Push .py files to fork branch via Contents API
        if: steps.convert.outputs.py_files != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          for py in ${{ steps.convert.outputs.py_files }}; do
            echo "Uploading $py to $HEAD_REPO@$HEAD_REF"

            CONTENT=$(base64 -w 0 "$py")

            # Check if file already exists (need its SHA to update)
            EXISTING_SHA=$(gh api "repos/$HEAD_REPO/contents/$py?ref=$HEAD_REF" \
              --jq '.sha' 2>/dev/null || echo "")

            if [ -n "$EXISTING_SHA" ]; then
              gh api "repos/$HEAD_REPO/contents/$py" \
                --method PUT \
                --field message="ci: update $py from notebook export [skip ci]" \
                --field content="$CONTENT" \
                --field branch="$HEAD_REF" \
                --field sha="$EXISTING_SHA"
            else
              gh api "repos/$HEAD_REPO/contents/$py" \
                --method PUT \
                --field message="ci: add $py from notebook export [skip ci]" \
                --field content="$CONTENT" \
                --field branch="$HEAD_REF"
            fi
            echo "✓ Pushed $py"
          done

